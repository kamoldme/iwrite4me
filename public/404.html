<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-LGSXDSW496"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}

    gtag('config', 'G-LGSXDSW496');

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — iWrite4.me</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;900&family=Instrument+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0a;
      --accent: #4ade80;
      --accent-glow: rgba(74, 222, 128, 0.28);
      --text: #ffffff;
      --text-muted: rgba(255,255,255,0.32);
      --border: rgba(255,255,255,0.08);
    }
    body {
      font-family: 'Instrument Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, transparent 50%, rgba(0,0,0,0.45) 100%);
      pointer-events: none;
    }
    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 32px;
    }
    .code {
      font-family: 'Archivo', system-ui, sans-serif;
      font-size: clamp(120px, 20vw, 240px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -6px;
      color: var(--text);
      text-shadow: 0 0 80px var(--accent-glow);
      margin-bottom: 16px;
      position: relative;
    }
    .code::after {
      content: '404';
      position: absolute;
      inset: 0;
      color: transparent;
      -webkit-text-stroke: 1px rgba(74, 222, 128, 0.15);
      transform: translate(4px, 4px);
    }
    .message {
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }
    .sub {
      font-size: 17px;
      color: rgba(255,255,255,0.55);
      font-weight: 300;
      max-width: 420px;
      margin: 0 auto 48px;
      line-height: 1.6;
    }
    .actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 36px;
      font-family: 'Instrument Sans', system-ui, sans-serif;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 9999px;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      border: none;
    }
    .btn-primary {
      background: var(--accent);
      color: #0a0a0a;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(74, 222, 128, 0.3);
      background: #86efac;
    }
    .btn-ghost {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover {
      background: rgba(255,255,255,0.05);
      border-color: rgba(74, 222, 128, 0.3);
      color: var(--accent);
      transform: translateY(-1px);
    }
    .cursor {
      display: inline-block;
      width: 3px;
      height: 20px;
      background: var(--accent);
      animation: blink 1s infinite;
      vertical-align: middle;
      margin-left: 4px;
      box-shadow: 0 0 8px var(--accent-glow);
    }
    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }
    .glow {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(74,222,128,0.08) 0%, transparent 60%);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="content">
    <div class="code">404</div>
    <p class="message">$ page not found<span class="cursor"></span></p>
    <p class="sub">
      Looks like you wandered off the page. No words were lost — but there's nothing here to write about.
    </p>
    <div class="actions">
      <a href="/" class="btn btn-ghost">Go Home</a>
      <a href="/app" class="btn btn-primary">Start Writing</a>
    </div>
  </div>
</body>
</html>
